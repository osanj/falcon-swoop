name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  python-version-publish: "3.10"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install nox
        run: |
          python -m pip install --upgrade pip
          pip install nox
      - name: Run nox for Python ${{ matrix.python-version }}
        run: |
          nox -p ${{ matrix.python-version }}

  publish:
    runs-on: ubuntu-latest
    needs: ["test"]
    if: github.event_name == 'release' && github.event.action == 'published'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ env.python-version-publish }}
        uses: actions/setup-python@v3
        with:
          python-version: ${{ env.python-version-publish }}
      - name: Build
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          hatchling version ${{ github.ref_name }}
          hatchling build -t wheel

