[project]
name = "falcon-swoop"
description = "Build simple APIs on top of falcon with pydantic data models, automated openapi doc generation included"
requires-python = ">=3.10"

# include py.typed?


[tool.pytest]
minversion = "9.0"
testpaths = ["src/falcon_swoop_test"]
python_files = ["*.py"]
python_functions = ["test_*"]

[tool.mypy]
mypy_path = "src"
packages = ["falcon_swoop", "falcon_swoop_test"]
strict = true
plugins = "pydantic.mypy"

[tool.black]
line-length = 120
target-version = ["py310"]
